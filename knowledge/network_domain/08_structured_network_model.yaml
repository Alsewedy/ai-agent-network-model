blocked_or_unnecessary_flows:
  - flow: "Broad LAN / DATA -> APP_ZONE access"
    final_state_should_remain: false

  - flow: "Broad LAN / DATA -> SERVICE_ZONE access"
    final_state_should_remain: false

  - flow: "Broad LAN / DATA -> DMZ_ZONE access"
    final_state_should_remain: false

  - flow: "Broad APP_ZONE -> LAN / DATA access"
    final_state_should_remain: false

  - flow: "Broad APP_ZONE -> SERVICE_ZONE access"
    final_state_should_remain: false

  - flow: "Broad APP_ZONE -> DMZ_ZONE access"
    final_state_should_remain: false

  - flow: "Broad SERVICE_ZONE -> LAN / DATA access"
    final_state_should_remain: false

  - flow: "Broad SERVICE_ZONE -> APP_ZONE access"
    final_state_should_remain: false

  - flow: "Broad SERVICE_ZONE -> DMZ_ZONE access"
    final_state_should_remain: false

  - flow: "Broad DMZ_ZONE -> internal destinations"
    final_state_should_remain: false

  - flow: "Admin laptop any-to-any access"
    final_state_should_remain: false

open_questions:
  - "What is the final least-privilege model for MGMT_SEGMENT?"
  - "What is the final least-privilege model for EMPLOYEE_SEGMENT?"
  - "What is the final least-privilege model for GUEST_SEGMENT?"
  - "Should any WAN-facing exposure be introduced later?"
  - "What exact management protocols should remain allowed from Admin laptop?"

target_security_intent:
  general:
    - "Move from broad build-phase connectivity to an auditable least-privilege model"
    - "Reduce unnecessary trust between zones"
    - "Allow only communication clearly justified by application, identity, management, or operational requirements"

  zone_intent:
    "LAN / DATA": "Highly trusted core infrastructure zone; should not be broadly reachable"
    "APP_ZONE": "Business application systems only; no broad trust into infrastructure or identity services"
    "SERVICE_ZONE": "Identity-related services only; communication should be tightly scoped"
    "DMZ_ZONE": "Should remain narrow and controlled; not a broadly trusted transit area"
    "ADMIN": "Privileged administration only; should not remain any-to-any"
    "MGMT": "Controlled management plane for infrastructure administration"
    "EMPLOYEE": "Normal internal user systems with minimum required access only"
    "GUEST": "Highly restricted and isolated"
    "WAN": "Inbound exposure should remain blocked by default"

  identity_intent:
    - "Identity-related communication should be treated as critical infrastructure traffic"
    - "Trust relationships should be minimized rather than implied by broad allow rules"

  database_and_secret_intent:
    - "Database access should be tightly restricted to systems that truly require it"
    - "Vault access should be limited to systems and functions that actually require secret retrieval"

  proxy_and_egress_intent:
    - "Outbound Internet access should remain controlled through PROXY01"
    - "Broad internal access to the entire DMZ should not remain in the final baseline"

  administrative_access_intent:
    - "Administrative access should be privileged, controlled, and auditable"
    - "Administrative paths should be based on approved targets, approved protocols, and clearly justified tasks"

metadata:
  confidence_model:
    confirmed: "Directly confirmed through code, config, env, or packet capture"
    owner_confirmed: "Confirmed directly by the owner"
    standard_default_declared_by_owner: "Accepted for the model as a standard/default value declared by the owner"
    open_question: "Still unresolved and should not be treated as final fact"