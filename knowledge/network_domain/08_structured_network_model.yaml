model:
  name: "Network Model v1"
  scope: "Homelab network domain"
  status: "active"
  notes:
    - "This YAML is the structured version of the network documentation."
    - "It is intended to support future AI agent reasoning, retrieval, API integration, and policy analysis."
    - "It does not replace the markdown files. It summarizes them in structured form."

zones:
  - name: "WAN"
    purpose: "External connectivity through pfSense"
    subnet: null
    gateway: null
    assets:
      - "Firewall01"

  - name: "LAN / DATA"
    purpose: "Core internal infrastructure"
    subnet: "192.168.128.0/24"
    gateway: "192.168.128.1"
    assets:
      - "DC01-CYBERAUDIT"
      - "DB01"

  - name: "APP_ZONE"
    purpose: "Main application servers"
    subnet: "192.168.20.0/24"
    gateway: "192.168.20.1"
    assets:
      - "APP01"
      - "APP02"

  - name: "DMZ_ZONE"
    purpose: "Proxy services and controlled outbound access"
    subnet: "192.168.10.0/24"
    gateway: "192.168.10.1"
    assets:
      - "PROXY01"

  - name: "SERVICE_ZONE"
    purpose: "Identity and access management services"
    subnet: "192.168.30.0/24"
    gateway: "192.168.30.1"
    assets:
      - "IAM01"

  - name: "MGMT"
    purpose: "Infrastructure management network"
    subnet: "192.168.50.0/24"
    gateway: "192.168.50.1"
    assets:
      - "ESXi"
      - "Switch Management"

  - name: "ADMIN"
    purpose: "Administrative workstations and privileged access devices"
    subnet: "192.168.60.0/24"
    gateway: "192.168.60.1"
    assets:
      - "Admin laptop"

  - name: "EMPLOYEE"
    purpose: "Internal employee devices and normal workstation-style systems"
    subnet: "192.168.70.0/24"
    gateway: "192.168.70.1"
    assets:
      - "Employee devices"

  - name: "GUEST"
    purpose: "Guest or untrusted access"
    subnet: "192.168.80.0/24"
    gateway: "192.168.80.1"
    assets:
      - "Guest devices"

assets:
  - name: "Firewall01"
    zone: "WAN"
    type: "firewall"
    services:
      - "network_firewalling"
      - "inter_zone_routing"
      - "default_gateway"
    purpose: "Central firewall and routing point for the segmented environment"

  - name: "DC01-CYBERAUDIT"
    zone: "LAN / DATA"
    type: "domain_controller"
    services:
      - "active_directory"
      - "internal_dns"
      - "time_service"
    purpose: "Internal directory foundation for the cyberaudit.local domain and internal name resolution"

  - name: "DB01"
    zone: "LAN / DATA"
    type: "database_and_secrets_host"
    services:
      - "mariadb"
      - "vault"
    purpose: "Hosts the MariaDB layer for SAAMS, including logically separated portal-side and internal audit-side databases, and also hosts Vault"
    hosted_components:
      - "saams_portal_db"
      - "audit_system_db"
      - "vault"

  - name: "APP01"
    zone: "APP_ZONE"
    type: "application_server"
    services:
      - "customer_facing_web_portal"
      - "nginx_reverse_proxy"
      - "tls_termination"
    purpose: "Hosts the customer-facing portal and the Nginx reverse proxy layer that listens on HTTPS and forwards traffic to the local portal process"

  - name: "APP02"
    zone: "APP_ZONE"
    type: "application_server"
    services:
      - "internal_employee_audit_application"
    purpose: "Hosts the internal C# employee audit application used for the internal workflow"

  - name: "IAM01"
    zone: "SERVICE_ZONE"
    type: "identity_and_api_server"
    services:
      - "keycloak"
      - "internal_api"
    purpose: "Central identity and access management platform for customer and internal authentication, and host of the internal API"

  - name: "PROXY01"
    zone: "DMZ_ZONE"
    type: "proxy_server"
    services:
      - "forward_proxy"
      - "controlled_outbound_access"
    purpose: "Dedicated egress-related system for structured outbound Internet access"

  - name: "ESXi"
    zone: "MGMT"
    type: "virtualization_host"
    services:
      - "virtualization_management"
    purpose: "Hosts the lab virtual machines and supports infrastructure management"

  - name: "Switch Management"
    zone: "MGMT"
    type: "network_management_interface"
    services:
      - "switch_administration"
    purpose: "Management interface for the Cisco switch infrastructure"

  - name: "Admin laptop"
    zone: "ADMIN"
    type: "administrative_workstation"
    services:
      - "administrative_access_workstation"
    purpose: "Used for privileged administrative access to the environment"

dependencies:
  - asset: "DB01"
    depends_on:
      - "DC01-CYBERAUDIT"
      - "PROXY01"

  - asset: "APP01"
    depends_on:
      - "IAM01"
      - "DB01"
      - "Vault on DB01"
      - "Internal API on IAM01"
      - "PROXY01"

  - asset: "APP02"
    depends_on:
      - "IAM01"
      - "DB01"
      - "Vault on DB01"
      - "PROXY01"

  - asset: "IAM01"
    depends_on:
      - "DC01-CYBERAUDIT"
      - "DB01"
      - "Vault on DB01"
      - "PROXY01"

  - asset: "DC01-CYBERAUDIT"
    depends_on:
      - "PROXY01"

  - asset: "PROXY01"
    depends_on:
      - "Firewall01"

required_flows:
  - source: "APP01"
    destination: "IAM01"
    purpose: "Customer authentication through Keycloak OIDC"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific ports and protocols required for Keycloak-based authentication"

  - source: "APP01"
    destination: "DB01"
    purpose: "Portal-side database access"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the database communication required by APP01"

  - source: "APP01"
    destination: "Vault on DB01"
    purpose: "Retrieve database credentials and client certificates"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific Vault-related access required by APP01"

  - source: "APP01"
    destination: "Internal API on IAM01"
    purpose: "Create internal requests, retrieve status updates, and download final reports"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the API endpoint access required by the portal"

  - source: "APP02"
    destination: "IAM01"
    purpose: "Employee authentication through Keycloak Device Flow with MFA"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific authentication-related communication required by the internal employee application"

  - source: "APP02"
    destination: "DB01"
    purpose: "Direct access to audit_system_db"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific database communication required by APP02"

  - source: "APP02"
    destination: "Vault on DB01"
    purpose: "Retrieve database credentials, certificates, and Keycloak-related configuration"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific Vault-related access required by APP02"

  - source: "IAM01"
    destination: "DC01-CYBERAUDIT"
    purpose: "LDAP federation, DNS, and time-related dependency"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the exact identity and infrastructure services required"

  - source: "IAM01"
    destination: "DB01"
    purpose: "Internal API access to audit_system_db and Vault"
    required_for_operation: true
    current_state: "broad_inter_zone_connectivity_exists"
    hardening_note: "Should later be restricted to only the specific database and Vault communication required"

  - source: "APP01"
    destination: "PROXY01"
    purpose: "Controlled outbound Internet egress"
    required_for_operation: true
    current_state: "broad_access_to_dmz_exists"
    hardening_note: "Should later be restricted to only proxy-related communication"

  - source: "APP02"
    destination: "PROXY01"
    purpose: "Controlled outbound Internet egress"
    required_for_operation: true
    current_state: "broad_access_to_dmz_exists"
    hardening_note: "Should later be restricted to only proxy-related communication"

  - source: "IAM01"
    destination: "PROXY01"
    purpose: "Controlled outbound Internet egress"
    required_for_operation: true
    current_state: "broad_access_to_dmz_exists"
    hardening_note: "Should later be restricted to only proxy-related communication"

  - source: "DB01"
    destination: "PROXY01"
    purpose: "Controlled outbound Internet egress"
    required_for_operation: true
    current_state: "broad_access_to_dmz_exists"
    hardening_note: "Should later be restricted to only proxy-related communication"

  - source: "DC01-CYBERAUDIT"
    destination: "PROXY01"
    purpose: "Controlled outbound Internet egress"
    required_for_operation: true
    current_state: "broad_access_to_dmz_exists"
    hardening_note: "Should later be restricted to only proxy-related communication"

  - source: "Admin laptop"
    destination: "target systems"
    purpose: "Privileged administration and management access"
    required_for_operation: true
    current_state: "admin_laptop_any_to_any"
    hardening_note: "Should later be narrowed to management-specific access only"

port_protocol_matrix:
  - source: "Client / browser"
    destination: "APP01"
    service: "nginx_reverse_proxy"
    protocol: "HTTPS"
    port: 443
    direction: "inbound_to_APP01"
    purpose: "Customer-facing secure access to the portal"
    status: "confirmed"

  - source: "Nginx on APP01"
    destination: "Local portal process on APP01"
    service: "reverse_proxy_forwarding"
    protocol: "HTTPS"
    port: 3000
    direction: "local_internal_flow"
    purpose: "Forward portal traffic from Nginx to the local Express application"
    status: "confirmed"

  - source: "APP01"
    destination: "IAM01"
    service: "Keycloak OIDC"
    protocol: "HTTP"
    port: 8080
    direction: "outbound_from_APP01"
    purpose: "Customer authentication and OIDC interaction"
